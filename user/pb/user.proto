syntax = "proto3";
package user_pb;

option go_package = "github.com/airlangga-hub/food-delivery-app/user/user_pb";

message RegisterCustomerRequest {
  string first_name = 1;
  string last_name = 2;
  string email = 3;
  string password = 4;
  string address = 5;
  string phone_number = 6;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message GetUserInfoRequest {
  string email = 1;
  string role = 2;
}

message TopUpBalanceRequest {
  string user_id = 1;
  string user_email = 2;
  int64 amount = 3;
}

message PaymentGatewayWebhookRequest {
  string user_id = 1;
  string payment_type = 2;
  int64 amount = 3;
}

message RegisterCustomerResponse {
  string first_name = 1;
  string last_name = 2;
  string email = 3;
  string address = 4;
  string phone_number = 5;
  int64 balance = 6;
}

message LoginResponse {
      string token = 1;
}

message GetUserInfoResponse {
  string first_name = 1;
  string last_name = 2;
  string email = 3;
  string address = 4;
  string phone_number = 5;
  int64 balance = 6;
}

message TopUpBalanceResponse {
  string payment_link = 1;
}

message PaymentGatewayWebhookResponse {} // empty response

message CreatePaymentRecordRequest {
  string id = 1;
  string email = 2;
  string email_status = 3;
  string payment_type = 4;
  PaymentGatewayResponse payment_gateway_response = 5;
}

message CreatePaymentRecordResponse {}

service UserService {
  rpc RegisterCustomer(RegisterCustomerRequest) returns (RegisterCustomerResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse);
  rpc TopUpBalance(TopUpBalanceRequest) returns (TopUpBalanceResponse);
  rpc PaymentGatewayWebhook(PaymentGatewayWebhookRequest) returns (PaymentGatewayWebhookResponse); //empty response
  rpc CreatePaymentRecord(CreatePaymentRecordRequest) returns (CreatePaymentRecordResponse);
}

message PaymentGatewayResponse {
  string payment_session_id = 1;
  string created = 2;
  string updated = 3;
  string status = 4;
  string reference_id = 5;
  string currency = 6;
  int64 amount = 7;
  string country = 8;
  string expires_at = 9;
  string session_type = 10;
  string mode = 11;
  string locale = 12;
  string business_id = 13;
  string customer_id = 14;
  string capture_method = 15;
  string description = 16;
  repeated PaymentGatewayItem items = 17;
  string success_return_url = 18;
  string cancel_return_url = 19;
  string payment_link_url = 20;
}

message PaymentGatewayItem {
  string reference_id = 1;
  string name = 2;
  string description = 3;
  string type = 4;
  string category = 5;
  int64 net_unit_amount = 6;
  int64 quantity = 7;
  string url = 8;
}
