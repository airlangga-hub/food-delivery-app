syntax = "proto3";
package pb;

import "google/protobuf/empty.proto";

option go_package = "github.com/airlangga-hub/food-delivery-app/order/pb";

message OrderIn {
  int64 delivery_fee = 1;
  repeated ItemsIn items_in = 2;
}

message ItemsIn {
  string id = 1;
  int64 quantity = 2;
}

message CreateOrderRequest {
  string user_id = 1;
  string user_email = 2;
  OrderIn order = 3;
}

message GetDriversRequest {
  string order_id = 1;
}

message ChooseDriverRequest {
  string order_id = 1;
  string driver_id = 2;
}

message GiveRatingRequest {
  string order_id = 1;
  int64 rating = 2;
}

message DriverApplyForOrderRequest {
  string order_id = 1;
  string driver_id = 2;
}

message DriverCompleteOrderRequest {
  string order_id = 1;
  string driver_id = 2;
}

message Restaurant {
  string id = 1;
  string name = 2;
  string address = 3;
  repeated Item items = 4;
}

message Item {
  string id = 1;
  string name = 2;
  int64 price = 3;
  int64 quantity = 4;
}

message CreateOrderResponse {
  string id = 1;
  repeated Restaurant restaurants = 2;
  string delivery_address = 3;
  string customer_phone_number = 4;
  string order_status = 5;
  int64 delivery_fee = 6;
  int64 total_fee = 7;
  string payment_link = 8;
}

message GetDriversResponse {
  repeated Driver drivers = 1;
}

message ChooseDriverResponse {
  string id = 1;
  repeated Restaurant restaurants = 2;
  string delivery_address = 3;
  string customer_phone_number = 4;
  string order_status = 5;
  Driver driver = 6;
  int64 delivery_fee = 7;
  int64 total_fee = 8;
  string payment_link = 9;
}

message Driver {
  string id = 1;
  double average_rating = 2;
  string name = 3;
  string bike = 4;
  string license_plate = 5;
  string phone_number = 6;
}

message GiveRatingResponse {} // empty response

message DriverGetPendingOrdersResponse {
  repeated Order orders = 1;
}

message Order {
  string id = 1;
  repeated Restaurant restaurants = 2;
  string delivery_address = 3;
  string customer_phone_number = 4;
  string order_status = 5;
  int64 delivery_fee = 6;
  int64 total_fee = 7;
  string payment_link = 8;
  Driver driver = 9;
}

message DriverApplyForOrderResponse {} // empty response

message DriverCompleteOrderResponse {} // empty response

message PaymentGatewayItem {
  string reference_id = 1;
  string name = 2;
  string description = 3;
  string type = 4;
  string category = 5;
  int64 net_unit_amount = 6;
  int64 quantity = 7;
  string url = 8;
}

message CreatePaymentSessionRequest {
  string payment_type = 1;
  string user_id = 2;
  string user_email = 3;
  int64 amount = 4;
  repeated PaymentGatewayItem items = 5;
}

message CreatePaymentSessionResponse {
  string payment_session_id = 1;
  string created = 2;
  string updated = 3;
  string status = 4;
  string reference_id = 5;
  string currency = 6;
  int64 amount = 7;
  string country = 8;
  string expires_at = 9;
  string session_type = 10;
  string mode = 11;
  string locale = 12;
  string business_id = 13;
  string customer_id = 14;
  string capture_method = 15;
  string description = 16;
  repeated PaymentGatewayItem items = 17;
  string success_return_url = 18;
  string cancel_return_url = 19;
  string payment_link_url = 20;
}

message GetOrdersByUserIDRequest {
      string user_id = 1;
      string role = 2;
}

message GetOrdersByUserIDResponse {
      repeated Order orders = 1;
}

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetDrivers(GetDriversRequest) returns (GetDriversResponse);
  rpc ChooseDriver(ChooseDriverRequest) returns (ChooseDriverResponse);
  rpc GiveRating(GiveRatingRequest) returns (GiveRatingResponse); // empty response
  rpc DriverGetPendingOrders(google.protobuf.Empty) returns (DriverGetPendingOrdersResponse);
  rpc DriverApplyForOrder(DriverApplyForOrderRequest) returns (DriverApplyForOrderResponse); // empty response
  rpc DriverCompleteOrder(DriverCompleteOrderRequest) returns (DriverCompleteOrderResponse); // empty response
  rpc CreatePaymentSession(CreatePaymentSessionRequest) returns (CreatePaymentSessionResponse);
  rpc GetOrdersByUserID(GetOrdersByUserIDRequest) returns (GetOrdersByUserIDResponse);
}
